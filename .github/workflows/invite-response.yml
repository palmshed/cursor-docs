name: Invite Response
on:
  issues:
    types: [opened]

jobs:
  respond:
    if: contains(github.event.issue.labels.*.name, 'invite')
    runs-on: ubuntu-latest
    steps:
      - id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.CURSOR_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CURSOR_BOT_PRIVATE_KEY }}
          permission-issues: write

      - name: Post acknowledgment
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "Thank you for your interest @${{ github.event.issue.user.login }}! Your invite request has been received and will be reviewed by the team.

          We aim to respond within a few days. If you have any questions, feel free to ask here."
