<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% if page.title %}{{ page.title }} – {% endif %}Cursor docs</title>
<link rel="icon" href="https://raw.githubusercontent.com/palmshed/vortai/main/frontend/public/favicon.ico">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

<div class="page">
<header>
  <div class="logo">▌ <a href="{{ '/' | relative_url }}" style="color:inherit;text-decoration:none">CURSOR</a></div>
  <div class="meta">documentation</div>
  <nav>
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/architecture/' | relative_url }}">Architecture</a>
    <a href="{{ '/engineering/' | relative_url }}">Engineering</a>
    <a href="{{ '/planner/' | relative_url }}">Planner</a>
    <a href="{{ '/telemetry/' | relative_url }}">Telemetry</a>
    <a href="{{ '/ux/' | relative_url }}">UX</a>
    <a href="{{ '/proposals/' | relative_url }}">Proposals</a>
    <a href="{{ '/release/' | relative_url }}">Release</a>
  </nav>
</header>

<div class="content">
{{ content }}
</div>

<footer>
  <div>
    <span class="slider">
      <span class="slider-icon">
        <img src="https://raw.githubusercontent.com/palmshed/vortai/main/frontend/public/favicon.ico" style="width:14px;height:14px;vertical-align:middle;margin-right:4px" alt="">
        Palmshed
      </span>
      <span class="slider-text">
        <a href="https://github.com/palmshed">Get data from /repos/palmshed</a>
      </span>
    </span>
    <span class="dropdown" id="invite-dd">
      <span class="dropdown-trigger">invite</span>
      <span class="dropdown-menu">
        <a href="https://bniladridas.github.io/cursor/invite.html">join as admin</a>
        <a href="https://bniladridas.github.io/cursor/invite.html">join as member</a>
      </span>
    </span>
  </div>
  <div>
    Apache 2.0 ·
    <a href="https://github.com/bniladridas/cursor">GitHub</a> ·
    <a href="https://bniladridas.github.io/cursor/">Cursor</a> ·
    <a href="https://bniladridas.github.io/cursor/about.html">About</a> ·
    🇺🇦 stand with Ukraine
  </div>
</footer>
</div>
<div class="bottom-glow" id="bottom-glow"></div>
<span id="layout-toggle" title="Toggle layout">
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M15 3h6v6"/><path d="m21 3-7 7"/><path d="m3 21 7-7"/><path d="M9 21H3v-6"/>
  </svg>
</span>
<div class="layout-hint" id="layout-hint">toggle portrait / landscape</div>
<script>
document.addEventListener('click', function(e){
  var dd = document.getElementById('invite-dd');
  if (dd && dd.contains(e.target)) {
    dd.classList.toggle('open');
  } else if (dd) {
    dd.classList.remove('open');
  }
});

var lt = document.getElementById('layout-toggle');
if(lt){lt.addEventListener('click', function(){
  document.body.classList.toggle('landscape');
  try{localStorage.setItem('layout', document.body.classList.contains('landscape') ? 'landscape' : 'portrait');}catch(e){}
});}
try{if(localStorage.getItem('layout') === 'landscape'){document.body.classList.add('landscape');}}catch(e){}
try{
  if(!localStorage.getItem('hint-dismissed')){
    var h = document.getElementById('layout-hint');
    if(h){h.classList.add('show');setTimeout(function(){h.classList.remove('show');},3000);}
    localStorage.setItem('hint-dismissed','1');
  }
}catch(e){}
var g = document.getElementById('bottom-glow');
function checkBottom(){
  if(document.documentElement.scrollHeight <= window.innerHeight) return;
  var b = document.documentElement.scrollHeight - window.innerHeight - window.scrollY;
  if(b < 80){g.classList.add('show');}else{g.classList.remove('show');}
}
window.addEventListener('scroll',checkBottom,{passive:true});
checkBottom();
</script>
</body>
</html>
